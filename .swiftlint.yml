disabled_rules:
  - trailing_whitespace
  - line_length

opt_in_rules:
  - empty_count
  - closure_spacing
  - explicit_init
  - sorted_first_last
  - redundant_nil_coalescing
  - contains_over_first_not_nil

excluded:
  - .build
  - build
  - Pods
  - Carthage
  - DerivedData
  - .swiftpm

line_length:
  warning: 120
  error: 150
  ignores_comments: true
  ignores_urls: true
  ignores_function_declarations: true
  ignores_triling_closure: true

type_body_length:
  warning: 300
  error: 400

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 50
  error: 100

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 40
    error: 50

type_name:
  min_length: 3
  max_length: 40

reporter: "xcode"