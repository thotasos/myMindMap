name: myMindMap
options:
  bundleIdPrefix: com.mymindmap
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    COMBINE_HIDPI_IMAGES: YES

targets:
  myMindMap:
    type: application
    platform: macOS
    sources:
      - path: Sources
        type: group
      - path: Resources
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mymindmap.app
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_NAME: myMindMap
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Resources/myMindMap.entitlements
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: NO
    dependencies: []
    preBuildScripts: []
    postBuildScripts: []

  myMindMapTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mymindmap.app.tests
        INFOPLIST_FILE: Tests/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/myMindMap.app/Contents/MacOS/myMindMap"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: myMindMap
